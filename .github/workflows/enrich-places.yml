name: Enrich Venues (Google Places API)

on:
  workflow_dispatch:  # Manual trigger only
    inputs:
      limit:
        description: 'Number of venues to process'
        required: true
        default: '500'
      resume:
        description: 'Resume from last position'
        required: false
        type: boolean
        default: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 2 hour max
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run Google Places Enrichment
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          if [ "${{ inputs.resume }}" = "true" ]; then
            npx tsx scripts/enrich-google-places.ts ${{ inputs.limit }} --resume
          else
            npx tsx scripts/enrich-google-places.ts ${{ inputs.limit }}
          fi
      
      - name: Upload progress file
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: enrichment-progress
          path: scripts/.places-api-progress.json
          retention-days: 30
